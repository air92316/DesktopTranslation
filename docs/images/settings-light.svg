<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <filter id="settingsShadow" x="-10%" y="-5%" width="130%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1B1F23" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Window outer frame -->
  <rect x="16" y="10" width="368" height="500" rx="8" ry="8" fill="#FAFBFC" filter="url(#settingsShadow)" stroke="#E1E4E8" stroke-width="1"/>

  <!-- ==================== TITLE BAR ==================== -->
  <rect x="16" y="10" width="368" height="36" rx="8" ry="8" fill="#F2F3F5"/>
  <rect x="16" y="34" width="368" height="12" fill="#F2F3F5"/>

  <!-- Gear icon (SVG) -->
  <g transform="translate(33,22)">
    <circle cx="8" cy="8" r="3" fill="none" stroke="#586069" stroke-width="1.3"/>
    <circle cx="8" cy="8" r="6.5" fill="none" stroke="#586069" stroke-width="1.3" stroke-dasharray="3 2.5"/>
  </g>

  <!-- Title text -->
  <text x="56" y="33" font-family="Segoe UI, sans-serif" font-size="13" font-weight="600" fill="#1B1F23">&#x8A2D;&#x5B9A;</text>

  <!-- Close X -->
  <g transform="translate(367,25)">
    <line x1="0" y1="0" x2="9" y2="9" stroke="#586069" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="0" x2="0" y2="9" stroke="#586069" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Separator below title -->
  <line x1="16" y1="46" x2="384" y2="46" stroke="#E1E4E8" stroke-width="1"/>

  <!-- ==================== TRANSLATION ENGINE SECTION ==================== -->

  <text x="40" y="74" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#1B1F23">&#x7FFB;&#x8B6F;&#x5F15;&#x64CE;</text>

  <!-- Radio: Google (inactive) -->
  <circle cx="52" cy="98" r="7" fill="none" stroke="#D1D5DA" stroke-width="1.5"/>
  <text x="66" y="102" font-family="Segoe UI, sans-serif" font-size="13" fill="#1B1F23">Google</text>

  <!-- Radio: LLM (active, filled) -->
  <circle cx="152" cy="98" r="7" fill="none" stroke="#4A6FA5" stroke-width="1.5"/>
  <circle cx="152" cy="98" r="4" fill="#4A6FA5"/>
  <text x="166" y="102" font-family="Segoe UI, sans-serif" font-size="13" fill="#1B1F23">LLM</text>

  <!-- LLM Provider label -->
  <text x="40" y="132" font-family="Segoe UI, sans-serif" font-size="12" fill="#586069">LLM Provider</text>
  <!-- LLM Provider dropdown -->
  <rect x="40" y="140" width="320" height="32" rx="6" ry="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
  <text x="54" y="161" font-family="Segoe UI, sans-serif" font-size="13" fill="#1B1F23">Claude</text>
  <!-- Dropdown chevron -->
  <polyline points="338,155 344,161 350,155" stroke="#8B949E" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- API Key label -->
  <text x="40" y="192" font-family="Segoe UI, sans-serif" font-size="12" fill="#586069">API Key</text>
  <!-- API Key input -->
  <rect x="40" y="200" width="320" height="32" rx="6" ry="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
  <!-- Dots for hidden key -->
  <g transform="translate(54,213)">
    <circle cx="0" cy="0" r="2.5" fill="#8B949E"/>
    <circle cx="10" cy="0" r="2.5" fill="#8B949E"/>
    <circle cx="20" cy="0" r="2.5" fill="#8B949E"/>
    <circle cx="30" cy="0" r="2.5" fill="#8B949E"/>
    <circle cx="40" cy="0" r="2.5" fill="#8B949E"/>
    <circle cx="50" cy="0" r="2.5" fill="#8B949E"/>
    <circle cx="60" cy="0" r="2.5" fill="#8B949E"/>
    <circle cx="70" cy="0" r="2.5" fill="#8B949E"/>
    <circle cx="80" cy="0" r="2.5" fill="#8B949E"/>
    <circle cx="90" cy="0" r="2.5" fill="#8B949E"/>
  </g>

  <!-- ==================== SEPARATOR ==================== -->
  <line x1="40" y1="248" x2="360" y2="248" stroke="#E1E4E8" stroke-width="1"/>

  <!-- ==================== GENERAL SECTION ==================== -->

  <text x="40" y="272" font-family="Segoe UI, sans-serif" font-size="12" font-weight="600" fill="#1B1F23">&#x4E00;&#x822C;</text>

  <!-- Auto-start: label + toggle -->
  <text x="40" y="298" font-family="Segoe UI, sans-serif" font-size="13" fill="#1B1F23">&#x958B;&#x6A5F;&#x81EA;&#x555F;&#x52D5;</text>
  <!-- Toggle track (ON state, blue) -->
  <rect x="310" y="285" width="40" height="22" rx="11" ry="11" fill="#4A6FA5"/>
  <!-- Toggle thumb -->
  <circle cx="339" cy="296" r="8" fill="#FAFBFC"/>

  <!-- Double-click interval -->
  <text x="40" y="330" font-family="Segoe UI, sans-serif" font-size="13" fill="#1B1F23">&#x96D9;&#x64CA;&#x9593;&#x9694;</text>
  <text x="350" y="330" font-family="Segoe UI, sans-serif" font-size="11" fill="#586069" text-anchor="end">400ms</text>
  <!-- Slider track -->
  <rect x="40" y="340" width="320" height="4" rx="2" ry="2" fill="#EBEDF0"/>
  <!-- Slider filled -->
  <rect x="40" y="340" width="128" height="4" rx="2" ry="2" fill="#4A6FA5"/>
  <!-- Slider thumb -->
  <circle cx="168" cy="342" r="7" fill="#FFFFFF" stroke="#4A6FA5" stroke-width="2"/>

  <!-- TTS speed -->
  <text x="40" y="374" font-family="Segoe UI, sans-serif" font-size="13" fill="#1B1F23">TTS &#x8A9E;&#x901F;</text>
  <text x="350" y="374" font-family="Segoe UI, sans-serif" font-size="11" fill="#586069" text-anchor="end">1.0x</text>
  <!-- Slider track -->
  <rect x="40" y="384" width="320" height="4" rx="2" ry="2" fill="#EBEDF0"/>
  <!-- Slider filled -->
  <rect x="40" y="384" width="224" height="4" rx="2" ry="2" fill="#4A6FA5"/>
  <!-- Slider thumb -->
  <circle cx="264" cy="386" r="7" fill="#FFFFFF" stroke="#4A6FA5" stroke-width="2"/>

  <!-- Theme label -->
  <text x="40" y="418" font-family="Segoe UI, sans-serif" font-size="12" fill="#586069">&#x4E3B;&#x984C;</text>
  <!-- Theme dropdown -->
  <rect x="40" y="424" width="320" height="32" rx="6" ry="6" fill="#FFFFFF" stroke="#E1E4E8" stroke-width="1"/>
  <text x="54" y="445" font-family="Segoe UI, sans-serif" font-size="13" fill="#1B1F23">&#x8DDF;&#x96A8;&#x7CFB;&#x7D71;</text>
  <polyline points="338,439 344,445 350,439" stroke="#8B949E" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ==================== SEPARATOR BEFORE BUTTONS ==================== -->
  <line x1="40" y1="470" x2="360" y2="470" stroke="#E1E4E8" stroke-width="1"/>

  <!-- ==================== ACTION BUTTONS ==================== -->

  <!-- Save button (solid blue) -->
  <rect x="218" y="482" width="72" height="32" rx="6" ry="6" fill="#4A6FA5"/>
  <text x="254" y="503" font-family="Segoe UI, sans-serif" font-size="13" fill="#FAFBFC" text-anchor="middle">&#x5132;&#x5B58;</text>

  <!-- Cancel button (outlined gray) -->
  <rect x="300" y="482" width="60" height="32" rx="6" ry="6" fill="none" stroke="#D1D5DA" stroke-width="1"/>
  <text x="330" y="503" font-family="Segoe UI, sans-serif" font-size="13" fill="#586069" text-anchor="middle">&#x53D6;&#x6D88;</text>
</svg>